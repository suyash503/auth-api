<body>
    <h1>sign up</h1>
    <form id="signup-form">
        <input type="text" id="username" placeholder="Username" required /><br>
        <input type="email" id="email" placeholder="Email" required /><br>
        <input type="password" id="password" placeholder="passWORD" required /><br>
        <button type="submit">Signup</button>
    </form>

    <h1>LOGIN</h1>
    <form id="login-form"> <input type="email" id="login-email" placeholder="Email" required /><br> <input type="password" id="login-password" placeholder="passWORD" required /><br> <button type="submit">Login</button>
    </form>

    <p id="status" style="color: green; font-weight: bold;"></p>


    <script src="script.js"></script>
</body>
</html>
